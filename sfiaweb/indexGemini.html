<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VC - sfiaweb</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-sidebar: #f1f3f5;
            --bg-main: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --accent-color: #0d6efd;
            --hover-color: #e2e6ea;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            color: var(--text-color);
        }

        /* --- Menu Lateral --- */
        #sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: bold;
            font-size: 1.2em;
            border-bottom: 1px solid var(--border-color);
            background-color: #e9ecef;
        }

        .menu-section {
            padding: 10px 20px 5px;
            font-size: 0.8em;
            text-transform: uppercase;
            color: #6c757d;
            font-weight: bold;
        }

        .menu-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
            word-break: break-all;
        }

        .menu-item:hover {
            background-color: var(--hover-color);
            color: var(--accent-color);
        }

        /* --- Área Principal --- */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            overflow-y: auto;
            padding: 40px;
        }

        #status-bar {
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #6c757d;
        }

        /* O pulo do gato: a área editável */
        #editor {
            outline: none; /* Remove a borda azul ao clicar */
            max-width: 1000px;
        }

        /* --- Tipografia Markdown --- */
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.9em; }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: right; }
        th { background-color: var(--bg-sidebar); font-weight: 600; text-align: left; }
        td:first-child { text-align: left; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        code { background: #f1f3f5; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        pre code { display: block; padding: 15px; overflow-x: auto; background: #212529; color: #f8f9fa; text-align: left; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">🌊 VC sfiaweb</div>
        
        <div class="menu-section">Gatilhos</div>
        <div class="menu-item" style="color: gray;">(Em breve...)</div>

        <div class="menu-section" style="margin-top: 15px;">Relatórios</div>
        <div id="lista-relatorios">
            <div class="menu-item">Carregando...</div>
        </div>
    </div>

    <div id="main">
        <div id="status-bar">Selecione um relatório no menu para visualizar e editar.</div>
        
        <div id="editor" contenteditable="true"></div>
    </div>

    <script>
        const listaRelatorios = document.getElementById('lista-relatorios');
        const editor = document.getElementById('editor');
        const statusBar = document.getElementById('status-bar');
        let arquivoAtual = null;

        // 1. Carrega a lista de relatórios ao abrir a página
        async function carregarLista() {
            try {
                const response = await fetch('/api/relatorios');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    listaRelatorios.innerHTML = '';
                    data.relatorios.forEach(rel => {
                        const div = document.createElement('div');
                        div.className = 'menu-item';
                        div.innerText = '📄 ' + rel.nome;
                        div.onclick = () => abrirRelatorio(rel.nome);
                        listaRelatorios.appendChild(div);
                    });
                }
            } catch (error) {
                listaRelatorios.innerHTML = '<div class="menu-item">Erro ao carregar lista.</div>';
                console.error(error);
            }
        }

        // 2. Abre o conteúdo de um relatório específico
        async function abrirRelatorio(nome) {
            statusBar.innerText = `Carregando ${nome}...`;
            try {
                const response = await fetch(`/api/relatorios/${nome}`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    arquivoAtual = nome;
                    // Converte MD para HTML e joga na div contenteditable
                    editor.innerHTML = marked.parse(data.conteudo);
                    statusBar.innerHTML = `📍 Editando: <strong>${nome}</strong> (Pressione Ctrl+S para salvar anotações)`;
                }
            } catch (error) {
                statusBar.innerText = `Erro ao carregar ${nome}.`;
                console.error(error);
            }
        }

        // 3. O interceptador de Ctrl+S
        document.addEventListener('keydown', function(e) {
            // Verifica se é Ctrl+S ou Cmd+S (Mac)
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault(); // Impede o "Salvar como..." do navegador
                
                if (!arquivoAtual) {
                    alert("Nenhum arquivo aberto para salvar!");
                    return;
                }

                // Pega o conteúdo HTML atual da div
                const htmlAnotado = editor.innerHTML;
                
                // Atualiza a barra de status visualmente
                const statusOriginal = statusBar.innerHTML;
                statusBar.innerHTML = `⏳ Salvando anotações em ${arquivoAtual}...`;
                
                // TODO: No próximo passo, faremos um fetch('POST') aqui para enviar 'htmlAnotado' para o FastAPI!
                console.log("Conteúdo a ser salvo:", htmlAnotado);
                
                setTimeout(() => {
                    statusBar.innerHTML = `✅ Salvo com sucesso! | 📍 Editando: <strong>${arquivoAtual}</strong>`;
                }, 1000); // Simulando o tempo de salvamento
            }
        });

        // Inicia
        carregarLista();
    </script>
</body>
</html>
