<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VC - sfiaweb</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            color: #212529;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* CABEÇALHO */
        header {
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }
        header h1 { font-size: 1em; font-weight: 600; color: #fff; }
        header span { font-size: 0.8em; color: #888; font-family: monospace; }

        /* CORPO PRINCIPAL */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* MENU LATERAL */
        nav {
            width: 240px;
            background: #fff;
            border-right: 1px solid #dee2e6;
            overflow-y: auto;
            flex-shrink: 0;
            padding: 10px 0;
        }
        nav p.secao {
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            color: #888;
            padding: 10px 15px 5px;
            letter-spacing: 0.05em;
        }
        nav a {
            display: block;
            padding: 8px 15px;
            font-size: 0.85em;
            color: #495057;
            text-decoration: none;
            border-left: 3px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        nav a:hover { background: #f8f9fa; color: #212529; }
        nav a.ativo {
            border-left-color: #0d6efd;
            background: #e8f0fe;
            color: #0d6efd;
            font-weight: 600;
        }

        /* ÁREA PRINCIPAL */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: #fff;
        }

        /* ESTADO INICIAL */
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #adb5bd;
            gap: 10px;
        }
        .placeholder p { font-size: 0.9em; }

        /* CONTEÚDO MD RENDERIZADO */
        #conteudo { outline: none; }
        #conteudo h1, #conteudo h2, #conteudo h3 {
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 6px;
            margin: 24px 0 12px;
        }
        #conteudo h1 { font-size: 1.6em; }
        #conteudo h2 { font-size: 1.3em; }
        #conteudo h3 { font-size: 1.1em; }
        #conteudo p { margin-bottom: 12px; line-height: 1.7; }
        #conteudo table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.85em;
        }
        #conteudo th, #conteudo td {
            border: 1px solid #dee2e6;
            padding: 8px 12px;
            text-align: left;
        }
        #conteudo th { background: #f1f3f5; font-weight: 600; }
        #conteudo tr:nth-child(even) { background: #f8f9fa; }
        #conteudo code {
            background: #f1f3f5;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        #conteudo pre code {
            display: block;
            padding: 15px;
            overflow-x: auto;
            background: #212529;
            color: #f8f9fa;
            border-radius: 6px;
        }
        #conteudo details {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 12px;
        }
        #conteudo summary { cursor: pointer; font-weight: 600; }
        #conteudo blockquote {
            border-left: 4px solid #dee2e6;
            padding-left: 15px;
            color: #6c757d;
            margin: 12px 0;
        }
    </style>
</head>
<body>

<header>
    <h1>⚖️ VC - sfiaweb</h1>
    <span id="dir-auditoria">carregando...</span>
</header>

<div class="container">
    <nav id="menu">
        <p class="secao">Relatórios</p>
    </nav>

    <main id="area-principal">
        <div class="placeholder">
            <p>← Selecione um relatório no menu</p>
        </div>
    </main>
</div>

<script>
    const menu = document.getElementById('menu');
    const areaPrincipal = document.getElementById('area-principal');
    const dirAuditoria = document.getElementById('dir-auditoria');

    // Carrega o dir do TOML no cabeçalho
    async function carregarConfig() {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();
            dirAuditoria.textContent = data.dir || '';
        } catch {
            dirAuditoria.textContent = 'erro ao ler config';
        }
    }

    // Carrega a lista de .md e monta o menu
    async function carregarMenu() {
        try {
            const res = await fetch('/api/relatorios');
            const data = await res.json();

            data.relatorios.forEach(rel => {
                const a = document.createElement('a');
                a.href = '#';
                a.textContent = rel.nome.replace('.md', '');
                a.dataset.nome = rel.nome;
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    carregarRelatorio(rel.nome, a);
                });
                menu.appendChild(a);
            });
        } catch (e) {
            menu.innerHTML += `<p style="padding:10px;color:red;font-size:0.8em;">Erro ao carregar lista</p>`;
        }
    }

    // Carrega e renderiza um .md
    async function carregarRelatorio(nome, linkEl) {
        // Marca o item ativo no menu
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('ativo'));
        linkEl.classList.add('ativo');

        areaPrincipal.innerHTML = '<div class="placeholder"><p>Carregando...</p></div>';

        try {
            const res = await fetch(`/api/relatorios/${nome}`);
            const data = await res.json();

            // Renderiza o Markdown e injeta na área principal com contenteditable
            const html = marked.parse(data.conteudo);
            areaPrincipal.innerHTML = `<div id="conteudo" contenteditable="true">${html}</div>`;

        } catch (e) {
            areaPrincipal.innerHTML = `<div class="placeholder"><p style="color:red">Erro ao carregar ${nome}</p></div>`;
        }
    }

    // Ctrl+S salva o HTML atual localmente
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 's') {
            e.preventDefault();
            const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'relatorio_anotado.html';
            a.click();
            URL.revokeObjectURL(url);
        }
    });

    // Inicializa
    carregarConfig();
    carregarMenu();
</script>

</body>
</html>
