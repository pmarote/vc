<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VC - Leitor de Relatórios e Skills</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --link-color: #0d6efd;
            --border-color: #dee2e6;
            --table-head-bg: #e9ecef;
            --accent-color: #0d6efd;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            line-height: 1.6;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Área de Upload / Drag & Drop */
        .upload-zone {
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #fff;
            margin-bottom: 30px;
            transition: background 0.3s;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.dragover { background: #e9ecef; }
        .upload-zone input[type="file"] { display: none; }

        /* Estilização do Conteúdo Renderizado */
        #content {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none; /* Escondido até carregar algo */
        }

        /* Tabelas (Crucial para a auditoria) */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9em;
        }
        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }
        th { background-color: var(--table-head-bg); font-weight: 600; }
        tr:nth-child(even) { background-color: #f8f9fa; }

        /* Metadados YAML */
        .metadata-box {
            background: #eef2f5;
            border-left: 4px solid var(--accent-color);
            padding: 15px 20px;
            margin-bottom: 30px;
            border-radius: 0 8px 8px 0;
            font-size: 0.9em;
        }
        .metadata-box h3 { margin-top: 0; color: var(--accent-color); }
        .metadata-box table { margin: 0; }
        .metadata-box th, .metadata-box td { padding: 6px 12px; border: none; border-bottom: 1px solid #ddd; }
        
        /* Tipografia Markdown */
        h1, h2, h3 { border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        code { background: #f1f3f5; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        pre code { display: block; padding: 15px; overflow-x: auto; background: #212529; color: #f8f9fa; }
        details { background: #f8f9fa; padding: 10px; border: 1px solid var(--border-color); border-radius: 5px; margin-bottom: 15px; }
        summary { font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <h2>📂 Arraste um arquivo .md aqui</h2>
        <p>Ou clique para selecionar (Relatórios, SKILL.md, etc)</p>
        <input type="file" id="fileInput" accept=".md">
    </div>

    <div id="content"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const contentDiv = document.getElementById('content');

        // Eventos de arrastar e soltar
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                renderContent(text);
                dropZone.style.display = 'none'; // Esconde a zona de upload
                contentDiv.style.display = 'block'; // Mostra o relatório
                document.title = file.name + " - VC Reader";
            };
            reader.readAsText(file);
        }

        function renderContent(text) {
            if (text.startsWith('---')) {
                const parts = text.split('---');
                if (parts.length >= 3) {
                    try {
                        const doc = jsyaml.load(parts[1]);
                        let metaHtml = "<div class='metadata-box'><h3>🏷️ Frontmatter (YAML)</h3><table>";
                        for (const [key, value] of Object.entries(doc)) {
                            metaHtml += `<tr><th>${key}</th><td>${typeof value === 'object' ? JSON.stringify(value) : value}</td></tr>`;
                        }
                        metaHtml += "</table></div>";
                        contentDiv.innerHTML = metaHtml + marked.parse(parts.slice(2).join('---'));
                        return;
                    } catch (e) {
                        console.warn("Erro ao fazer parse do YAML", e);
                    }
                }
            }
            contentDiv.innerHTML = marked.parse(text);
        }
    </script>
</body>
</html>
